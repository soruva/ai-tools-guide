<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="100" height="100" rx="24" fill="#111111"/>

  <!-- Aモチーフ -->
  <path d="M30 75 L50 25 L70 75 Z" fill="none" stroke="url(#grad)" stroke-width="6" stroke-linejoin="round"/>

  <!-- 中の横ライン（A強調） -->
  <line x1="40" y1="55" x2="60" y2="55" stroke="url(#grad)" stroke-width="5" stroke-linecap="round"/>
</svg>
